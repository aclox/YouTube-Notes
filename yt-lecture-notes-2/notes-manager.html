<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes Library – LectureNotes</title>
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-logo-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <span class="sidebar-brand-text">LectureNotes</span>
        </div>
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search your notes...">
        </div>
      </div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="videos">Videos</button>
        <button class="tab-btn" data-tab="playlists">Playlists</button>
      </div>
      <div class="note-list" id="note-list">
        <div class="loading">Loading your notes...</div>
      </div>
    </aside>

    <main class="main">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <h2>Select a note to read</h2>
        <p>Your saved notes appear on the left. Click any video to open its notes here.</p>
      </div>

      <div class="note-view" id="note-view" style="display:none">
        <div class="note-view-header">
          <div class="note-view-meta">
            <img class="note-thumb" id="note-thumb" src="" alt="">
            <div>
              <h1 class="note-view-title" id="note-view-title"></h1>
              <div class="note-view-sub" id="note-view-sub"></div>
            </div>
          </div>
          <div class="note-view-actions">
            <button class="action-btn" id="open-video-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor"/></svg>
              Open Video
            </button>
            <button class="action-btn" id="export-note-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export
            </button>
            <button class="action-btn danger" id="delete-note-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Delete
            </button>
          </div>
        </div>
        <div class="note-content" id="note-content"></div>
      </div>

      <div class="playlist-view" id="playlist-view" style="display:none">
        <div class="playlist-view-header">
          <div>
            <h1 id="playlist-view-title">Playlist Notes</h1>
            <p id="playlist-view-sub">Compiled from all videos in this playlist</p>
          </div>
          <button class="action-btn" id="export-playlist-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export All
          </button>
        </div>
        <div class="playlist-notes" id="playlist-notes"></div>
      </div>
    </main>
  </div>
  <script src="manager.js"></script>
</body>
</html>
